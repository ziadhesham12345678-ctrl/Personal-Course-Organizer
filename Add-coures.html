        <section class="add-course">
            <div class="containerr">
                <form>
                    <div class="info">
                        <div class="name-course">
                            <p>Add Your Courses :</p>
                            <input type="text" placeholder="Your Name">
                        </div>
                        <div class="course-select">
                            <h5>Slecet Your Course :</h5>
                            <label class="radio-card">CSS
                                <input type="radio" name="course" value="css">
                            </label>
                            
                            <label>HTML
                                <input type="radio" name="course" value="Html">
                            </label>
                            
                            <label>JAVA SCRIPT
                                <input type="radio" name="course" value="JS">
                            </label>
                            
                            <label>C++
                                <input type="radio" name="course" value="C++">
                            </label>
                        </div>
                        <div class="level">
                            <h5>Select Your Level :</h5>
                            <label class="level-card">Beginner
                                <input type="radio" name="level" value="Beginner">
                            </label>
                            
                            <label class="level-card">Intermediate
                                <input type="radio" name="level" value="Intermediate">
                            </label>
                            
                            <label class="level-card">Advanced
                                <input type="radio" name="level" value="Advanced">
                            </label>
                        </div>
                        <div class="note">
                            <input type="text" placeholder="Note">
                        </div>
                        
                    </div>
                    <button type="submit" >submit</button>
                </form>
                
            </div>
            
        </section>

       <div class="form-box">
    <h2>Add Course :</h2>

    <form>
        <table class="course-table">

            <tr>
                <td><label>Course Name</label></td>
                <td><input type="text" placeholder="Enter course name"></td>
            </tr>

            <tr>
                <td><label>Instructor</label></td>
                <td><input type="text" placeholder="Enter instructor"></td>
            </tr>

            <tr>
                <td><label>Credit Hours</label></td>
                <td><input type="number" placeholder="Enter hours"></td>
            </tr>

            <tr>
                <td><label>Notes</label></td>
                <td><input type="text" placeholder="Write notes"></td>
            </tr>

            <tr>
                <td colspan="2" class="btn-cell">
                    <button type="submit">Add Course</button>
                </td>
            </tr>

        </table>
    </form>
